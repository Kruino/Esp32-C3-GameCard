; PlatformIO Project Configuration File
; ESP32-C3 + WeAct Studio 2.9" B/W e-paper (DEPG0290BS / SSD1680)

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200

; Route Arduino's `Serial` to the ESP32-C3's built-in native USB (USB Serial/JTAG)
; instead of UART0. Required for boards that plug into the PC over native USB
; (SuperMini, WeAct C3, etc.) so the Web Serial page can actually reach the device.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    zinggjm/GxEPD2 @ ^1.6.4
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit BusIO @ ^1.16.1
